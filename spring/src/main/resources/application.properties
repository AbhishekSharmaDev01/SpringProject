spring.application.name=spring
# Enable the H2 Web Console so we can view our tables in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Connection Settings
spring.datasource.url=jdbc:h2:mem:frauddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.settings.web-allow-others=true

# Tell JPA to automatically create or update your database tables based on your Java classes
spring.jpa.hibernate.ddl-auto=update
# Show the generated SQL queries in your console (great for learning!)
spring.jpa.show-sql=true